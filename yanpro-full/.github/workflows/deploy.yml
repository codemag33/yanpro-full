name: Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Check syntax (all *.js files)
        run: find src db -name "*.js" -type f -exec node --check {} \;
        working-directory: backend

  build:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.github/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Опциональный шаг: деплой на сервер через SSH
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Раскомментируйте этот шаг, если у вас есть VPS/сервер и установлены GitHub Secrets
    # steps:
    #   - name: Deploy to server
    #     uses: appleboy/ssh-action@master
    #     with:
    #       host: ${{ secrets.DEPLOY_HOST }}
    #       username: ${{ secrets.DEPLOY_USER }}
    #       key: ${{ secrets.DEPLOY_SSH_KEY }}
    #       script: |
    #         cd /app/yanpro
    #         docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
    #         docker-compose -f .github/docker/docker-compose.yml down
    #         docker-compose -f .github/docker/docker-compose.yml up -d
    steps:
      - run: echo "Deploy step skipped (configure SSH secrets for auto-deploy)"
