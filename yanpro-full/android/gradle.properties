# JAVA_HOME намеренно не фиксируется здесь: локально (Termux/AndroidIDE)
# используется java из PATH, в CI (GitHub Actions) JAVA_HOME выставляет
# сам workflow (actions/setup-java). Если понадобится жёстко закрепить
# путь для конкретного устройства — раскомментируйте и подставьте свой:
# org.gradle.java.home=/data/data/com.termux/files/usr/lib/jvm/java-21-openjdk

# ─── Производительность ──────────────────────────────────────────────────────
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# ─── Android ─────────────────────────────────────────────────────────────────
android.useAndroidX=true
android.enableJetifier=false
