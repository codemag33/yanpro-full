<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Yan.Pro — Пассажир v2.2</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F9D58">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{--g:#0F9D58;--bg-light:#F4F6F5;--bg-dark:#0F1419;--card-light:#FFF;--card-dark:#1A1F2E;--text-light:#1B1F1D;--text-dark:#E0E0E0;--muted-light:#6B7570;--muted-dark:#888}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;font:14px -apple-system,Roboto,sans-serif}
body.light-mode{background:var(--bg-light);color:var(--text-light)}
body.dark-mode{background:var(--bg-dark);color:var(--text-dark)}
#map{position:absolute;inset:0}

#header{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;justify-content:space-between;align-items:center;z-index:10;backdrop-filter:blur(10px)}
body.light-mode #header{background:rgba(255,255,255,.9)}
body.dark-mode #header{background:rgba(15,23,42,.9)}

#theme-toggle{background:none;border:none;font-size:20px;cursor:pointer;padding:8px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-content{background:var(--card-light);border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
body.dark-mode .modal-content{background:var(--card-dark)}

.rating-stars{display:flex;justify-content:center;gap:12px;margin:20px 0;font-size:32px}
.star{cursor:pointer;opacity:.4;transition:all .2s}
.star.active{opacity:1;transform:scale(1.2)}

button{font-family:inherit;border:none;border-radius:10px;padding:12px 16px;cursor:pointer;font-weight:700;font-size:15px}
.btn-primary{background:var(--g);color:#fff}
.btn-gray{background:#F0F0F0;color:#000}
body.dark-mode .btn-gray{background:#333;color:#fff}

.toast{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:12px 18px;border-radius:24px;z-index:200;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

.hidden{display:none!important}
</style>
</head>
<body class="light-mode">

<div id="header">
  <h1 style="margin:0;font-size:18px;">Yan.Pro</h1>
  <button id="theme-toggle" title="Переключить тему">🌙</button>
</div>

<div id="map"></div>

<!-- ФОРМА ОЦЕНКИ -->
<div id="ratingModal" class="modal">
  <div class="modal-content">
    <div style="font-size:20px;font-weight:700;margin-bottom:16px;text-align:center">Спасибо за поездку!</div>
    
    <div style="background:var(--bg-light);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:12px;color:var(--muted-light);margin-bottom:8px">ВОДИТЕЛЬ</div>
      <div style="font-size:16px;font-weight:700" id="rating-driver-name">--</div>
    </div>
    
    <div style="text-align:center;margin-bottom:20px">
      <label style="font-size:12px;display:block;margin-bottom:12px">Оцените водителя:</label>
      <div class="rating-stars">
        <span class="star" data-rating="1">⭐</span>
        <span class="star" data-rating="2">⭐</span>
        <span class="star" data-rating="3">⭐</span>
        <span class="star" data-rating="4">⭐</span>
        <span class="star" data-rating="5">⭐</span>
      </div>
      <input type="hidden" id="rating-value" value="5">
    </div>
    
    <textarea id="rating-comment" placeholder="Ваше мнение..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;resize:vertical;min-height:80px;font-family:inherit"></textarea>
    
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-gray" style="flex:1" onclick="skipRating()">Пропустить</button>
      <button class="btn-primary" style="flex:1" onclick="submitRating()">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const state={
  serverUrl:localStorage.getItem('yanpro_server')||'http://localhost:3002',
  token:localStorage.getItem('yanpro_token'),
  theme:localStorage.getItem('yanpro_theme')||'light-mode',
  rating:5
};

// ════════════════ ТЁМНЫЙ РЕЖИМ ════════════════
document.body.className=state.theme;
document.getElementById('theme-toggle').addEventListener('click',()=>{
  const isDark=document.body.classList.contains('dark-mode');
  document.body.classList.remove('light-mode','dark-mode');
  if(isDark){
    document.body.classList.add('light-mode');
    state.theme='light-mode';
    document.getElementById('theme-toggle').textContent='🌙';
  }else{
    document.body.classList.add('dark-mode');
    state.theme='dark-mode';
    document.getElementById('theme-toggle').textContent='☀️';
  }
  localStorage.setItem('yanpro_theme',state.theme);
});

// ════════════════ ЗВЁЗДЫ ════════════════
document.querySelectorAll('.star').forEach(star=>{
  star.onclick=()=>{
    const rating=parseInt(star.dataset.rating);
    state.rating=rating;
    document.getElementById('rating-value').value=rating;
    document.querySelectorAll('.star').forEach((s,i)=>{
      s.classList.toggle('active',i<rating);
    });
  };
});

function submitRating(){
  alert('✓ Спасибо за отзыв!');
  document.getElementById('ratingModal').classList.remove('show');
}

function skipRating(){
  document.getElementById('ratingModal').classList.remove('show');
}

// ════════════════ КАРТА ════════════════
const map=new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/liberty',
  center:[55.0988,51.7727],
  zoom:13
});

if(!state.token) window.location.href='/passenger?redirect=auth';
</script>
</body>
</html>
