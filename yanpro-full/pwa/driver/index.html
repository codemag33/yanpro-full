<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Yan.Pro — Водитель</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFCC00">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{--y:#FFCC00;--bg:#141414;--card:#1F1F1F;--text:#FFF;--muted:#999;--d:#E24C4B;--s:0 4px 12px rgba(0,0,0,.4)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;font:14px -apple-system,Roboto,sans-serif;background:var(--bg);color:var(--text)}
#map{position:absolute;inset:0;z-index:1}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;border:1px solid #333}

.timer-badge{position:fixed;top:20px;left:20px;background:var(--d);color:#fff;padding:12px 16px;border-radius:8px;font-weight:700;z-index:50;font-size:18px}

.notification-badge{position:fixed;top:20px;right:20px;background:var(--y);color:#000;padding:12px 16px;border-radius:8px;font-weight:700;z-index:50;animation:pulse 0.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

#sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:var(--s);padding:18px;z-index:30;max-height:70vh;overflow-y:auto;border:1px solid #333}
.hidden{display:none!important}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.form-group input{width:100%;padding:12px;background:#222;border:1px solid #333;border-radius:10px;color:var(--text);font-size:16px;font-family:inherit}

.route-info{background:#222;border-radius:14px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.route-stat{text-align:center}
.route-stat-value{font-size:18px;font-weight:700;color:var(--y)}
.route-stat-label{font-size:11px;color:var(--muted);margin-top:4px}

.action-buttons{display:flex;gap:10px;margin-bottom:14px}
button{font-family:inherit;border:none;border-radius:10px;padding:12px;cursor:pointer;font-weight:700;font-size:15px}
.btn-primary{background:var(--y);color:#000;flex:1}
.btn-gray{background:#333;color:var(--text);flex:1}
.btn-danger{background:var(--d);color:#fff;flex:1}

.toast{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:14px 20px;border-radius:8px;z-index:200;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

.passenger-info{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #333}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--y);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.info-text{flex:1}
.info-name{font-weight:700}
.info-phone{font-size:12px;color:var(--muted);margin-top:4px}

.status-card{text-align:center;padding:18px;background:#222;border-radius:14px;margin-bottom:14px}
.status-big{font-size:20px;font-weight:700;color:var(--y);margin-bottom:8px}
</style>
</head>
<body>

<div id="map"></div>

<!-- ВХОДЯЩИЙ ЗАКАЗ С ТАЙМЕРОМ -->
<div id="incomingModal" class="modal">
  <div class="notification-badge">🔔 НОВЫЙ ЗАКАЗ</div>
  <div class="modal-content" style="text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🚕</div>
    <h2 style="margin-bottom:8px;">Новый заказ!</h2>
    <div class="timer-badge" id="timer-display">15</div>
    
    <div style="background:#222;padding:16px;border-radius:12px;margin:20px 0;text-align:left;">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">МАРШРУТ</div>
      <div style="color:var(--y);font-weight:700;margin-bottom:4px" id="incoming-from">Откуда...</div>
      <div style="color:var(--y);font-weight:700" id="incoming-to">Куда...</div>
    </div>
    
    <div class="route-info">
      <div class="route-stat">
        <div class="route-stat-value" id="incoming-distance">0</div>
        <div class="route-stat-label">км</div>
      </div>
      <div class="route-stat">
        <div class="route-stat-value" id="incoming-price">0</div>
        <div class="route-stat-label">₽ (примерно)</div>
      </div>
    </div>
    
    <div style="display:flex;gap:10px;">
      <button class="btn-gray" style="flex:1" onclick="rejectRide()">Отклонить</button>
      <button class="btn-primary" style="flex:1" onclick="acceptRide()">Принять</button>
    </div>
  </div>
</div>

<!-- АКТИВНАЯ ПОЕЗДКА -->
<div id="sheet" class="hidden">
  <div class="status-card">
    <div class="status-big">🚕 В пути</div>
  </div>
  
  <div class="route-info">
    <div class="route-stat">
      <div class="route-stat-value" id="sheet-distance">0</div>
      <div class="route-stat-label">км осталось</div>
    </div>
    <div class="route-stat">
      <div class="route-stat-value" id="sheet-eta">--</div>
      <div class="route-stat-label">мин (ETA)</div>
    </div>
  </div>
  
  <div class="passenger-info" id="passenger-card">
    <div class="avatar" id="passenger-avatar">П</div>
    <div class="info-text">
      <div class="info-name" id="passenger-name">Пассажир</div>
      <div class="info-phone" id="passenger-phone">+7...</div>
    </div>
  </div>
  
  <div class="action-buttons">
    <button class="btn-gray" id="btn-chat">💬 Чат</button>
    <button class="btn-primary" id="btn-finish">✓ Завершить</button>
    <button class="btn-danger" id="btn-cancel">✕ Отменить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const ORENBURG={lat:51.7727,lon:55.0988};
const state={
  serverUrl:localStorage.getItem('yanpro_server')||'http://localhost:3002',
  token:localStorage.getItem('yanpro_token'),
  user:JSON.parse(localStorage.getItem('yanpro_user')||'{}'),
  socket:null,
  map:null,
  activeRideId:null,
  timerInterval:null,
  soundContext:null
};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),3000)}

// ════════════════════ ЗВУК ════════════════════
function playNotificationSound(){
  try{
    if(!state.soundContext)state.soundContext=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=state.soundContext;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value=800;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.5);
  }catch(e){console.log('Sound not available')}
}

// ════════════════════ КАРТА ════════════════════
function initMap(){
  state.map=new maplibregl.Map({
    container:'map',
    style:'https://tiles.openfreemap.org/styles/liberty',
    center:[ORENBURG.lon,ORENBURG.lat],
    zoom:13
  });
}

function placeMarker(kind,lat,lon,emoji){
  const el=document.createElement('div');
  el.style.cssText='width:40px;height:40px;border-radius:50%;background:'+(kind==='self'?'#FFD700':'#007AFF')+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)';
  el.textContent=emoji||'🚕';
  new maplibregl.Marker({element:el}).setLngLat([lon,lat]).addTo(state.map);
}

// ════════════════════ ТАЙМЕР ЗАКАЗА ════════════════════
function startTimer(){
  let seconds=15;
  document.getElementById('timer-display').textContent=seconds;
  state.timerInterval=setInterval(()=>{
    seconds--;
    document.getElementById('timer-display').textContent=seconds;
    if(seconds<=0){
      clearInterval(state.timerInterval);
      rejectRide();
    }
  },1000);
}

// ════════════════════ ВХОДЯЩИЙ ЗАКАЗ ════════════════════
function showIncomingRide(data){
  playNotificationSound();
  
  document.getElementById('incoming-from').textContent=data.pickup||'Откуда...';
  document.getElementById('incoming-to').textContent=data.destination||'Куда...';
  document.getElementById('incoming-distance').textContent=(data.distance/1000).toFixed(1)||'0';
  document.getElementById('incoming-price').textContent=Math.round((data.distance/1000)*20+50)||'--';
  
  document.getElementById('incomingModal').classList.add('show');
  startTimer();
}

function acceptRide(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  const rideId=state.activeRideId;
  if(!rideId||!state.socket)return;
  state.socket.emit('ride:accept',{rideId});
  document.getElementById('incomingModal').classList.remove('show');
}

function rejectRide(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  document.getElementById('incomingModal').classList.remove('show');
}

// ════════════════════ SOCKET.IO ════════════════════
function connectSocket(){
  if(state.socket)state.socket.disconnect();
  state.socket=io(state.serverUrl,{auth:{token:state.token},transports:['websocket','polling']});
  
  state.socket.on('ride:new_request',(data)=>{
    state.activeRideId=data.rideId;
    showIncomingRide(data);
  });
  
  state.socket.on('ride:accepted',()=>{
    document.getElementById('sheet').classList.remove('hidden');
  });
}

// ════════════════════ ИНИЦИАЛИЗАЦИЯ ════════════════════
if(!state.token){window.location.href='/driver?redirect=auth';return}
initMap();
connectSocket();
</script>
</body>
</html>
