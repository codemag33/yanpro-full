server {
    listen 80;
    server_name _;
    
    # Redirect to HTTPS (if you have SSL)
    # return 301 https://$server_name$request_uri;

    # Serve PWA clients with proper caching
    location /passenger {
        proxy_pass http://app:3002/passenger;
        proxy_http_version 1.1;
        
        # PWA needs proper caching headers
        location = /passenger/index.html {
            proxy_pass http://app:3002/passenger/index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        location ~ /passenger/.*\.json$ {
            proxy_pass http://app:3002$request_uri;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Assets
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /driver {
        proxy_pass http://app:3002/driver;
        proxy_http_version 1.1;
        
        location = /driver/index.html {
            proxy_pass http://app:3002/driver/index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        location ~ /driver/.*\.json$ {
            proxy_pass http://app:3002$request_uri;
            add_header Cache-Control "public, max-age=3600";
        }
        
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API endpoints
    location /api {
        proxy_pass http://app:3002/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO
    location /socket.io {
        proxy_pass http://app:3002/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://app:3002/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_proxied any;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

